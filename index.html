<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta de Tragos</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #f39c12;
            border-bottom: 2px solid #f39c12;
            padding-bottom: 10px;
        }
        .trago {
            margin: 20px 0;
            padding: 15px;
            background-color: #1e1e1e;
            border-radius: 8px;
        }
        .precio {
            color: #2ecc71;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Nuestra Barra</h1>

    <div class="trago">
        <h2>Fernet con Coca</h2>
        <p>El clásico indiscutible. 30% magia, 70% felicidad.</p>
        <p class="precio">$3500</p>
    </div>

    <div class="trago">
        <h2>Gin Tonic con Frutos Rojos</h2>
        <p>Gin London Dry, tónica, arándanos y un toque de lima.</p>
        <p class="precio">$4000</p>
    </div>

</body>
</html>
